<div class="forgot-password-container">
  <h2>Recuperar Contraseña</h2>
  
  <p class="subtitle">
    Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
  </p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="input-group">
      <i class="fa fa-envelope"></i>
      <input 
        type="email" 
        formControlName="email" 
        placeholder="Correo electrónico"
        [class.error]="form.get('email')?.invalid && form.get('email')?.touched"
        autocomplete="email"
      />
    </div>

    <div *ngIf="form.get('email')?.touched && form.get('email')?.errors" class="validation-error">
      <span *ngIf="form.get('email')?.errors?.['required']">El email es requerido</span>
      <span *ngIf="form.get('email')?.errors?.['email']">Ingresa un email válido</span>
    </div>

    <button type="submit" [disabled]="loading || form.invalid">
      {{ loading ? 'Enviando...' : 'Enviar Enlace' }}
    </button>
  </form>

  <div *ngIf="successMessage" class="success-message">
    <i class="fa fa-check-circle"></i>
    {{ successMessage }}
  </div>

  <div *ngIf="errorMessage" class="error">
    <i class="fa fa-exclamation-circle"></i>
    {{ errorMessage }}
  </div>

  <a routerLink="/auth/login" class="back-to-login">
    <i class="fa fa-arrow-left"></i> Volver al Login
  </a>
</div>
