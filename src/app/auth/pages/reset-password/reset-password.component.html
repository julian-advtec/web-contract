<div class="reset-password-container">
  <!-- Watermark -->
  <div class="watermark-cyan">Secure Password Reset</div>
  
  <div class="reset-password-card">
    <h2>Restablecer Contraseña</h2>

    <!-- Mensaje de token inválido -->
    <div *ngIf="errorMessage && !resetForm.touched" class="error-message token-error">
      <i class="fas fa-exclamation-triangle"></i> 
      {{ errorMessage }}
      <button (click)="requestNewLink()" class="link-button">
        Solicitar nuevo enlace
      </button>
    </div>

    <!-- Formulario de restablecimiento (solo mostrar si token es válido) -->
    <form *ngIf="!errorMessage || resetForm.touched" [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="reset-form">
      
      <!-- Nueva Contraseña -->
      <div class="input-group" [class.invalid]="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.invalid">
        <i class="fas fa-lock"></i>
        <input 
          [type]="showNewPassword ? 'text' : 'password'" 
          formControlName="newPassword" 
          placeholder="Nueva contraseña (mínimo 6 caracteres)"
          required>
        <i 
          class="fas toggle-password"
          [class.fa-eye]="!showNewPassword"
          [class.fa-eye-slash]="showNewPassword"
          (click)="togglePasswordVisibility('newPassword')">
        </i>
      </div>

      <!-- Mensajes de error para nueva contraseña -->
      <div *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.errors" class="error-message field-error">
        <div *ngIf="resetForm.get('newPassword')?.errors?.['required']">
          <i class="fas fa-exclamation-circle"></i> La contraseña es requerida
        </div>
        <div *ngIf="resetForm.get('newPassword')?.errors?.['minlength']">
          <i class="fas fa-exclamation-circle"></i> La contraseña debe tener al menos 6 caracteres
        </div>
      </div>

      <!-- Confirmar Contraseña -->
      <div class="input-group" [class.invalid]="resetForm.get('confirmPassword')?.touched && resetForm.hasError('mismatch')">
        <i class="fas fa-lock"></i>
        <input 
          [type]="showConfirmPassword ? 'text' : 'password'" 
          formControlName="confirmPassword" 
          placeholder="Confirmar nueva contraseña"
          required>
        <i 
          class="fas toggle-password"
          [class.fa-eye]="!showConfirmPassword"
          [class.fa-eye-slash]="showConfirmPassword"
          (click)="togglePasswordVisibility('confirmPassword')">
        </i>
      </div>

      <!-- Mensaje de error para confirmación -->
      <div *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.hasError('mismatch')" class="error-message field-error">
        <i class="fas fa-exclamation-circle"></i> Las contraseñas no coinciden
      </div>

      <!-- Botón de envío -->
      <button 
        type="submit" 
        class="btn-primary" 
        [disabled]="resetForm.invalid || isLoading">
        <span *ngIf="!isLoading">Restablecer Contraseña</span>
        <span *ngIf="isLoading" class="loading-text">
          <i class="fas fa-spinner fa-spin"></i> Procesando...
        </span>
      </button>

    </form>

    <!-- Mensaje de éxito -->
    <div *ngIf="successMessage" class="success-message">
      <i class="fas fa-check-circle"></i> 
      <div class="success-text">{{ successMessage }}</div>
      <div class="redirect-message">Serás redirigido automáticamente al login...</div>
      <a routerLink="/auth/login" class="auth-link success-link">
        <i class="fas fa-arrow-left"></i> Ir al Login ahora
      </a>
    </div>

    <!-- Enlace de regreso -->
    <a *ngIf="!successMessage && (!errorMessage || resetForm.touched)" routerLink="/auth/login" class="auth-link">
      <i class="fas fa-arrow-left"></i> Volver al Login
    </a>
  </div>
</div>
