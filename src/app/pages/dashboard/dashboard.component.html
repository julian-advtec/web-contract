<!-- src/app/pages/dashboard/dashboard.component.html -->
<div class="app-container">
  <!-- Sidebar fijo con clase condicional -->
  <div class="drawer-fixed" [class.collapsed]="sidebarCollapsed">
    <app-sidebar 
      [currentUser]="currentUser"
      [availableModules]="availableModules"
      [sidebarCollapsed]="sidebarCollapsed"
      [getUserRoleName]="getUserRoleName"
      (toggleSidebar)="onToggleSidebar($event)"
      (logout)="onLogout()">
    </app-sidebar>
  </div>
  
  <!-- Navbar Component -->
  <app-navbar
    [currentUser]="currentUser"
    [sidebarCollapsed]="sidebarCollapsed"
    (logout)="onLogout()"
    (toggleSidebar)="onToggleSidebar($event)">
  </app-navbar>

  <!-- Main Content -->
  <main class="main-with-margin" [style.backgroundImage]="'url(' + backgroundImage + ')'">
    <!-- Contenedor centrado -->
    <div class="container-fluid">
      <div class="welcome-overlay">
        <h1 class="welcome-title">¡Bienvenido!</h1>
        <p class="welcome-message">
          Hola <strong>{{ currentUser?.username || 'Usuario' }}</strong>, 
          has ingresado al sistema como <strong>{{ getUserRoleName(currentUser?.role) }}</strong>.
        </p>
        <p class="welcome-subtitle">
          Utiliza el menú lateral para navegar entre los módulos disponibles.
        </p>
      </div>
    </div>
  </main>
</div>

<!-- ELIMINADO: Modal de Confirmación de Logout (ahora se usa el servicio) -->
