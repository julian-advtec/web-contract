<div class="contratista-creacion-container">
  <div class="contratista-creacion-inner">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="page-title">
        <i class="fas fa-building me-2"></i>
        {{ isEditMode ? 'Editar Contratista' : 'Nuevo Contratista' }}
      </h2>
      <button class="btn btn-outline-secondary" (click)="cancelar()">
        <i class="fas fa-arrow-left me-2"></i> Volver
      </button>
    </div>

    <!-- Mensajes -->
    <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show">
      <i class="fas fa-exclamation-triangle me-2"></i>
      {{ errorMessage }}
      <button type="button" class="btn-close" (click)="dismissError()"></button>
    </div>

    <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i>
      {{ successMessage }}
      <button type="button" class="btn-close" (click)="dismissSuccess()"></button>
    </div>

    <!-- Loading -->
    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border text-primary"></div>
      <p class="mt-2">Cargando datos del contratista...</p>
    </div>

    <!-- Formulario -->
    <form *ngIf="!isLoading" [formGroup]="contratistaForm" (ngSubmit)="guardarContratista()" class="main-card">

      <div class="card-section">
        <div class="section-header">
          <h5 class="mb-0">Datos Generales del Contratista</h5>
        </div>
        <div class="section-body">

          <!-- Fila 1: Tipo Documento, Número Documento -->
          <div class="row">
            <div class="col-md-3 mb-3">
              <label class="form-label required-field">Tipo Documento</label>
              <select class="form-control" formControlName="tipoDocumento">
                <option value="CC">Cédula de Ciudadanía</option>
                <option value="CE">Cédula de Extranjería</option>
                <option value="NIT">NIT</option>
                <option value="PAS">Pasaporte</option>
              </select>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label required-field">Número Documento</label>
              <input type="text" class="form-control" formControlName="documentoIdentidad"
                     [ngClass]="{'is-invalid': submitted && f['documentoIdentidad'].errors}"
                     placeholder="Ej: 123456789" maxlength="20"
                     (blur)="verificarDocumento()">
              <div *ngIf="submitted && f['documentoIdentidad'].errors" class="invalid-feedback">
                Documento requerido (mínimo 3 caracteres)
              </div>
              <div *ngIf="documentoExistente" class="text-danger small mt-1">
                <i class="fas fa-exclamation-triangle me-1"></i> Ya existe un contratista con este documento
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label required-field">Razón Social</label>
              <input type="text" class="form-control" formControlName="razonSocial"
                     [ngClass]="{'is-invalid': submitted && f['razonSocial'].errors}"
                     placeholder="Nombre completo o razón social" maxlength="200">
              <div *ngIf="submitted && f['razonSocial'].errors" class="invalid-feedback">
                La razón social es requerida
              </div>
            </div>
          </div>

          <!-- Fila 2: Representante Legal, Documento Representante -->
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Representante Legal</label>
              <input type="text" class="form-control" formControlName="representanteLegal"
                     placeholder="Nombre del representante legal" maxlength="200">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Documento Representante</label>
              <input type="text" class="form-control" formControlName="documentoRepresentante"
                     placeholder="Documento del representante" maxlength="20">
            </div>
          </div>

          <!-- Fila 3: Teléfono, Email -->
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Teléfono</label>
              <input type="text" class="form-control" formControlName="telefono" placeholder="Ej: 3001234567" maxlength="15">
            </div>
            <div class="col-md-8 mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" formControlName="email" placeholder="correo@ejemplo.com" maxlength="100">
            </div>
          </div>

          <!-- Fila 4: Dirección -->
          <div class="row">
            <div class="col-md-12 mb-3">
              <label class="form-label">Dirección</label>
              <textarea class="form-control" formControlName="direccion" rows="2" placeholder="Dirección de correspondencia"></textarea>
            </div>
          </div>

          <!-- Fila 5: Departamento, Ciudad -->
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Departamento</label>
              <input type="text" class="form-control" formControlName="departamento" placeholder="Ej: Antioquia" maxlength="50">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Ciudad</label>
              <input type="text" class="form-control" formControlName="ciudad" placeholder="Ej: Medellín" maxlength="50">
            </div>
          </div>

          <!-- Fila 6: Tipo Contratista, Estado - Ordenado alfabéticamente -->
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Tipo Contratista</label>
              <select class="form-control" formControlName="tipoContratista">
                <option value="">Seleccione tipo</option>
                <option value="CONSORCIO">Consorcio</option>
                <option value="PERSONA_JURIDICA">Persona Jurídica</option>
                <option value="PERSONA_NATURAL">Persona Natural</option>
                <option value="UNION_TEMPORAL">Unión Temporal</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label required-field">Estado</label>
              <select class="form-control" formControlName="estado">
                <option value="ACTIVO">Activo</option>
                <option value="INACTIVO">Inactivo</option>
              </select>
            </div>
          </div>

        </div>

        <div class="section-footer text-end">
          <button type="button" class="btn btn-outline-danger me-2 px-4" (click)="cancelar()">
            <i class="fas fa-times me-2"></i> Cancelar
          </button>
          <button type="submit" class="btn btn-success px-4" [disabled]="isSubmitting">
            <span *ngIf="!isSubmitting">
              <i class="fas fa-save me-2"></i> {{ isEditMode ? 'Actualizar' : 'Guardar' }} Contratista
            </span>
            <span *ngIf="isSubmitting">
              <i class="fas fa-spinner fa-spin me-2"></i> Guardando...
            </span>
          </button>
        </div>
      </div>

    </form>
  </div>
</div>
