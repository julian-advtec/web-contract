<div class="app-container">
    <!-- Sidebar FIXED -->
    <div class="drawer-fixed" [class.collapsed]="sidebarCollapsed">
        <app-sidebar 
            [currentUser]="currentUser" 
            [availableModules]="availableModules"
            [sidebarCollapsed]="sidebarCollapsed" 
            (toggleSidebar)="onToggleSidebar($event)" 
            (logout)="onLogout()">
        </app-sidebar>
    </div>

    <!-- Navbar FIXED -->
    <app-navbar 
        [currentUser]="currentUser" 
        [sidebarCollapsed]="sidebarCollapsed" 
        (logout)="onLogout()"
        (toggleSidebar)="onToggleSidebar($event)">
    </app-navbar>

    <!-- CONTENIDO PRINCIPAL CON MARGEN - AJUSTADO -->
    <main class="main-with-margin" [class.sidebar-collapsed]="sidebarCollapsed">
        <div class="container-fluid py-4">
            
            <!-- Mensajes -->
            <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
                {{ errorMessage }}
                <button type="button" class="btn-close" (click)="dismissError()" aria-label="Close"></button>
            </div>
            
            <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
                {{ successMessage }}
                <button type="button" class="btn-close" (click)="dismissSuccess()" aria-label="Close"></button>
            </div>
            
            <!-- VISTA FORM -->
            <app-radicacion-form 
                *ngIf="showForm && puedeRadicar"
                (documentoRadicado)="onDocumentoRadicado($event)"
                (cancelar)="onCancelarRadicacion()">
            </app-radicacion-form>

            <!-- Mensaje si no tiene permisos para radicar -->
            <div *ngIf="showForm && !puedeRadicar" class="alert alert-warning">
                <i class="fas fa-exclamation-triangle"></i> 
                No tienes permisos para radicar documentos.
            </div>

            <!-- VISTA LISTA -->
            <app-radicacion-list
                *ngIf="!showForm && puedeVer"
                (nuevoRadicado)="toggleView()">
            </app-radicacion-list>

            <!-- Mensaje si no tiene permisos para ver -->
            <div *ngIf="!showForm && !puedeVer" class="alert alert-warning">
                <i class="fas fa-exclamation-triangle"></i> 
                No tienes permisos para ver documentos radicados.
            </div>

        </div>
    </main>
</div>
