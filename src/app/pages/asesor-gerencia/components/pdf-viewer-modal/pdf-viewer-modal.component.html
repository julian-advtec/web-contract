<div class="modal-backdrop" 
     *ngIf="isOpen"
     (click)="onBackdropClick($event)">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content shadow-lg">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title d-flex align-items-center">
          <i class="fas fa-file-pdf me-2"></i>
          {{ title || 'Visualizador de PDF' }}
        </h5>
        <button type="button" class="btn-close btn-close-white" 
                (click)="close()" 
                aria-label="Cerrar"></button>
      </div>

      <div class="modal-body p-0 position-relative overflow-hidden">
        <!-- Contenedor del PDF -->
        <div class="pdf-container" *ngIf="pdfUrl">
          <embed 
            [src]="pdfUrl" 
            type="application/pdf" 
            width="100%" 
            height="100%"
            class="pdf-embed">
        </div>

        <!-- Overlay de protección (evita clic derecho y selección) -->
        <div class="protection-overlay" *ngIf="pdfUrl"></div>

        <!-- Loading -->
        <div *ngIf="!pdfUrl && !error" class="loading-overlay">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando PDF...</span>
          </div>
          <p class="mt-3 text-muted">Preparando documento...</p>
        </div>

        <!-- Error -->
        <div *ngIf="error" class="error-overlay text-center p-5">
          <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
          <h5 class="text-danger">No se pudo cargar el PDF</h5>
          <p class="text-muted">{{ error }}</p>
          <button class="btn btn-outline-primary mt-3" (click)="close()">
            Cerrar
          </button>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="close()">
          <i class="fas fa-times me-1"></i> Cerrar
        </button>
      </div>
    </div>
  </div>
</div>
