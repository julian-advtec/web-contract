<div class="admin-layout" [class.closed]="isClosed">
  <!-- Sidebar -->
  <aside class="navigation-drawer" [class.closed]="isClosed">
    <div class="drawer-header">
      <div class="hospital-logo">
        <img src="assets/images/logo.png" alt="Logo" class="logo-image" />

      </div>
      <div class="hospital-text">

      </div>
    </div>

    <!-- Menú -->
    <nav class="nav-menu">
      <div class="menu-container">
        <a routerLink="/tutelas" routerLinkActive="active" class="nav-link">
          <i class="fas fa-gavel"></i>
          <span class="nav-label">Tutelas</span>
        </a>
        <a routerLink="/fallos" routerLinkActive="active" class="nav-link">
          <i class="fas fa-balance-scale"></i>
          <span class="nav-label">Fallos</span>
        </a>
        <a routerLink="/impugnaciones" routerLinkActive="active" class="nav-link">
          <i class="fas fa-file-signature"></i>
          <span class="nav-label">Impugnaciones</span>
        </a>
        <a routerLink="/desacatos" routerLinkActive="active" class="nav-link">
          <i class="fas fa-exclamation-triangle"></i>
          <span class="nav-label">Desacatos</span>
        </a>
        <a routerLink="/pendientes" routerLinkActive="active" class="nav-link">
          <i class="fas fa-hourglass-half"></i>
          <span class="nav-label">Pendientes</span>
        </a>
        <a routerLink="/derechos-de-peticion" routerLinkActive="active" class="nav-link">
          <i class="fas fa-envelope-open-text"></i>
          <span class="nav-label">Derechos de Petición</span>
        </a>
      </div>
    </nav>

    <!-- Footer con usuario -->
    <div class="drawer-footer">
      <div class="user-details">
        <div class="user-avatar">U</div>
        <div class="user-role-info">
          <div class="user-name">Usuario</div>
          <div class="user-role">Rol: Administrador</div>
        </div>
      </div>
      <button class="logout-btn">
        <i class="material-icons">logout</i>
        <span>Cerrar Sesión</span>
      </button>
    </div>

    <!-- Toggle -->
    <button class="toggle-sidebar" (click)="toggleSidebar()">
      <i class="material-icons">chevron_left</i>
    </button>
  </aside>

  <!-- Contenido principal -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
